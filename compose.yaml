name: f1-telemetry

x-backend-environment: &backend-environment
  F1_APP_NAME: F1 Telemetry
  F1_ENVIRONMENT: development
  F1_LOG_LEVEL: INFO
  F1_API_HOST: 0.0.0.0
  F1_API_PORT: 8000
  F1_WEB_ORIGIN: http://localhost:3000
  F1_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-f1telemetry}:${POSTGRES_PASSWORD:-f1telemetry_dev}@postgres:5432/${POSTGRES_DB:-f1telemetry}
  F1_REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379/0
  F1_WORKER_POLL_INTERVAL_SECONDS: 5

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-f1telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-f1telemetry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-f1telemetry_dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:8-alpine
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:-redis_dev}",
      ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./backend
      target: development
    command: ["f1-api"]
    init: true
    environment: *backend-environment
    ports:
      - "127.0.0.1:${F1_API_PORT:-8000}:8000"
    volumes:
      - ./backend/src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./backend
      target: development
    command: ["f1-worker"]
    init: true
    environment: *backend-environment
    volumes:
      - ./backend/src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 10s

  frontend:
    build:
      context: ./frontend
      target: development
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]
    init: true
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${F1_API_PORT:-8000}/api/v1
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  frontend_next:
